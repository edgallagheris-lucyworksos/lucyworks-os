name: LucyWorks OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-release-checks:
    name: Backend release checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run core backend smoke test
        run: python smoke_test.py

      - name: Run hospital-scale overnight smoke test
        run: python hospital_scale_smoke_test.py

      - name: Run flow-state realignment smoke test
        run: python flow_state_smoke_test.py

      - name: Run live-action gate smoke test
        run: python live_action_gate_smoke_test.py

      - name: Run workspace role queue smoke test
        run: python workspace_smoke_test.py

      - name: Run catalogue import smoke test
        run: python catalogue_smoke_test.py

      - name: Run HR staffing smoke test
        run: python hr_smoke_test.py

      - name: Run BVS readiness smoke test
        run: python readiness_smoke_test.py

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build
