name: Day Control Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  day-control-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run day-control smoke test
        working-directory: apps/api
        run: python day_control_smoke_test.py
