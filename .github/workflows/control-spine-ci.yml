name: LucyWorks Verified Build

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "config/**"
      - "deploy/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "config/**"
      - "deploy/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/**"

jobs:
  api-smoke-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies
        run: python -m pip install --upgrade pip -q && pip install -q -r requirements.txt
      - name: Compile API modules
        run: python -m compileall -q app migrations
      - name: Run production readiness v4 test
        id: production_readiness
        continue-on-error: true
        run: python production_readiness_smoke_test.py > production-readiness.log 2>&1
      - name: Run hospital operating system v3 test
        id: hospital_ops_v3
        continue-on-error: true
        run: python hospital_ops_v3_smoke_test.py > hospital-ops-v3.log 2>&1
      - name: Run verified identity smoke test
        id: identity
        continue-on-error: true
        run: python auth_identity_smoke_test.py > identity.log 2>&1
      - name: Run governed integration smoke test
        id: integrations
        continue-on-error: true
        run: python integration_smoke_test.py > integrations.log 2>&1
      - name: Run control spine legacy fixture
        id: control_spine
        continue-on-error: true
        env:
          LUCYWORKS_LEGACY_TEST_BYPASS: "true"
        run: python control_spine_smoke_test.py > control-spine.log 2>&1
      - name: Run patient-care evidence legacy fixture
        id: patient_evidence
        continue-on-error: true
        env:
          LUCYWORKS_LEGACY_TEST_BYPASS: "true"
        run: python evidence_patient_care_smoke_test.py > patient-evidence.log 2>&1
      - name: Run SQLite migration chain
        id: sqlite_migration
        continue-on-error: true
        env:
          DATABASE_URL: sqlite:////tmp/lucyworks-migration.db
          AUTO_CREATE_SCHEMA: "false"
        run: |
          rm -f /tmp/lucyworks-migration.db
          alembic upgrade head > migration.log 2>&1
          alembic current >> migration.log 2>&1
      - name: Upload API validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verified-api-logs
          path: |
            apps/api/production-readiness.log
            apps/api/hospital-ops-v3.log
            apps/api/identity.log
            apps/api/integrations.log
            apps/api/control-spine.log
            apps/api/patient-evidence.log
            apps/api/migration.log
          if-no-files-found: error
      - name: Report API validation failures
        if: steps.production_readiness.outcome == 'failure' || steps.hospital_ops_v3.outcome == 'failure' || steps.identity.outcome == 'failure' || steps.integrations.outcome == 'failure' || steps.control_spine.outcome == 'failure' || steps.patient_evidence.outcome == 'failure' || steps.sqlite_migration.outcome == 'failure'
        run: |
          for file in production-readiness.log hospital-ops-v3.log identity.log integrations.log control-spine.log patient-evidence.log migration.log; do
            echo "--- $file ---"
            tail -n 220 "$file" || true
          done
          exit 1

  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lucyworks
          POSTGRES_PASSWORD: lucyworks
          POSTGRES_DB: lucyworks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lucyworks -d lucyworks_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql+psycopg://lucyworks:lucyworks@localhost:5432/lucyworks_test
      AUTO_CREATE_SCHEMA: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies
        run: python -m pip install --upgrade pip -q && pip install -q -r requirements.txt
      - name: Apply PostgreSQL migrations
        run: alembic upgrade head | tee postgres-migration.log
      - name: Verify PostgreSQL schema version
        run: |
          python - <<'PY' | tee -a postgres-migration.log
          from sqlalchemy import inspect, text
          from app.database import engine
          inspector = inspect(engine)
          required = {
              "evidenceevent", "approvaltask", "accountablehandover", "compliancecontrol",
              "serviceavailability", "aimodelregistration", "criticalresultacknowledgement",
              "integrationconnection", "integrationenvelope", "integrationentitylink",
              "hospitalpremises", "operationalarea", "canonicalepisodestate", "operationalblock",
              "operationaldependency", "operationalcommand", "operationalconflict", "boardchangeevent",
              "scenariorun", "importbatch", "importreconciliationitem",
              "readinesscontrol", "readinessevidence", "securityassessmentrun", "pilotrun",
              "pilotobservation", "alembic_version",
          }
          missing = required - set(inspector.get_table_names())
          assert not missing, f"missing PostgreSQL tables: {sorted(missing)}"
          with engine.connect() as connection:
              version = connection.execute(text("select version_num from alembic_version")).scalar_one()
          assert version == "0006_production_readiness", version
          print("PostgreSQL production-readiness migration verified", version)
          PY
      - name: Prove concurrent stale-write protection
        run: python hospital_ops_postgres_concurrency_test.py | tee -a postgres-migration.log
      - name: Upload PostgreSQL migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-migration-log
          path: apps/api/postgres-migration.log
          if-no-files-found: warn

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web dependencies
        run: npm install --no-audit --no-fund
      - name: Build web application
        id: web_build
        continue-on-error: true
        run: npm run build > web-build.log 2>&1
      - name: Upload web build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verified-web-log
          path: apps/web/web-build.log
          if-no-files-found: error
      - name: Report web build failure
        if: steps.web_build.outcome == 'failure'
        run: tail -n 220 web-build.log && exit 1

  production-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate mapping profiles and scripts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          files = list(Path("config/integrations").glob("*.mapping.json"))
          assert len(files) >= 4, files
          for path in files:
              payload = json.loads(path.read_text())
              assert payload["profileVersion"] == 1
              assert payload["requiredFields"]
              assert payload["fieldMappings"]
          print("validated mapping profiles", len(files))
          PY
          bash -n scripts/production-preflight.sh scripts/production-backup.sh scripts/restore-rehearsal.sh
          python -m py_compile scripts/security-probe.py
      - name: Build production containers
        run: |
          docker build -t lucyworks-api-ci apps/api
          docker build --build-arg API_INTERNAL_BASE=http://api:8000 -t lucyworks-web-ci apps/web
      - name: Validate production Compose stack
        run: |
          cat > deploy/.env.production <<'EOF'
          DEPLOYMENT_ENVIRONMENT=production
          AUTH_MODE=oidc
          AUTH_ENFORCEMENT=required
          AUTH_DEV_LOGIN_ENABLED=false
          AUTH_AUDIENCE=lucyworks-api
          OIDC_ISSUER=https://identity.invalid/
          OIDC_JWKS_URL=https://identity.invalid/keys
          OIDC_AUTHORIZATION_URL=https://identity.invalid/authorize
          OIDC_TOKEN_URL=https://identity.invalid/token
          OIDC_CLIENT_ID=ci-client
          OIDC_CLIENT_SECRET=ci-secret-not-used-at-runtime
          AUTH_ROLE_MAP={"ci":"admin"}
          AUTO_CREATE_SCHEMA=false
          SECURITY_HEADERS_ENABLED=true
          RATE_LIMIT_ENABLED=true
          LUCYWORKS_LEGACY_TEST_BYPASS=false
          METRICS_API_KEY=ci-metrics-key-not-used-at-runtime
          EOF
          PUBLIC_DOMAIN=ci.example.invalid POSTGRES_PASSWORD=ci-database-password docker compose --env-file deploy/.env.production -f deploy/docker-compose.production.yml config >/tmp/lucyworks-compose.yml
