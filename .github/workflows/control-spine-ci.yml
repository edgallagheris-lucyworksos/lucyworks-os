name: Control Spine CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - ".github/workflows/control-spine-ci.yml"
  push:
    branches:
      - feature/control-spine-v2
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - ".github/workflows/control-spine-ci.yml"

jobs:
  api-smoke-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile API modules
        run: python -m compileall -q app
      - name: Run control spine smoke test
        run: python control_spine_smoke_test.py
      - name: Run patient-care evidence smoke test
        run: python evidence_patient_care_smoke_test.py

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web dependencies
        run: npm install --no-audit --no-fund
      - name: Build web application
        run: npm run build
