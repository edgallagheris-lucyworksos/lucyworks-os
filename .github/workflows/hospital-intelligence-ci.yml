name: Hospital Intelligence Check

on:
  pull_request:
    paths:
      - "config/hospital-intelligence/**"
      - "apps/api/app/hospital_intelligence_routes.py"
      - "apps/api/hospital_intelligence_smoke_test.py"
      - "apps/api/app/main.py"
      - "apps/web/app/hospital-intelligence/**"
      - "apps/web/components/hospital-intelligence-panel.tsx"
      - "apps/web/app/system-control/page.tsx"
      - ".github/workflows/hospital-intelligence-ci.yml"
  push:
    branches: [main, "feature/**"]
    paths:
      - "config/hospital-intelligence/**"
      - "apps/api/app/hospital_intelligence_routes.py"
      - "apps/api/hospital_intelligence_smoke_test.py"
      - "apps/api/app/main.py"
      - "apps/web/app/hospital-intelligence/**"
      - "apps/web/components/hospital-intelligence-panel.tsx"
      - "apps/web/app/system-control/page.tsx"
      - ".github/workflows/hospital-intelligence-ci.yml"

jobs:
  catalogue-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Validate public catalogue structure
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("config/hospital-intelligence/referral-hospital-public-catalogue.v1.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          assert data["catalogueVersion"] == 1
          assert len(data["hospitals"]) >= 5
          assert len(data["roleTemplates"]) >= 30
          assert len(data["departmentTemplates"]) >= 20
          assert len(data["workflowPatterns"]) >= 10
          source_refs = {item["sourceRef"] for item in data["sources"]}
          for collection in (data["hospitals"], data["roleTemplates"], data["departmentTemplates"], data["workflowPatterns"]):
              for item in collection:
                  missing = set(item.get("sourceRefs", [])) - source_refs
                  assert not missing, (item.get("name") or item.get("title") or item, missing)
          assert data["governance"]["containsPersonalStaffRecords"] is False
          print("validated hospital intelligence catalogue")
          PY
      - name: Install API dependencies
        working-directory: apps/api
        run: python -m pip install --upgrade pip -q && pip install -q -r requirements.txt
      - name: Compile and test API
        working-directory: apps/api
        run: |
          python -m compileall -q app
          python hospital_intelligence_smoke_test.py

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build web application
        run: npm run build
