global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: lucyworks-api
    metrics_path: /api/metrics
    static_configs:
      - targets: ["api:8000"]
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics-token

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
