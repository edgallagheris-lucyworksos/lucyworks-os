groups:
  - name: lucyworks-availability
    rules:
      - alert: LucyWorksApiDown
        expr: up{job="lucyworks-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: LucyWorks API is unavailable
          description: Prometheus has been unable to scrape the API for two minutes.

      - alert: LucyWorksServerErrors
        expr: increase(lucyworks_http_server_errors_total[5m]) > 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Repeated LucyWorks server errors
          description: More than two HTTP 5xx responses occurred in five minutes.

      - alert: LucyWorksSlowRequests
        expr: |
          sum(rate(lucyworks_http_request_duration_seconds_total[5m]))
          /
          clamp_min(sum(rate(lucyworks_http_requests_total[5m])), 0.001)
          > 1.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: LucyWorks average request duration is high
          description: Average request duration has exceeded 1.5 seconds for five minutes.

      - alert: LucyWorksApiRestarted
        expr: lucyworks_process_uptime_seconds < 300
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: LucyWorks API restarted recently
          description: The API process uptime is below five minutes.
